services:
  agente:
    build: .
    ports:
      - "8000:8000"
    environment:
      - COHERE_API_KEY=${COHERE_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-command-a-03-2025}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embed-multilingual-v3.0}
      - PDF_DIR=pdfs
      - TEMPERATURE=0.7
    volumes:
      - ./pdfs:/app/pdfs:ro
    restart: unless-stopped
