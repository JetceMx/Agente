services:
  agente:
    build: .
    ports:
      - "8000:8000"
    environment:
      - COHERE_API_KEY=${COHERE_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-command-a-03-2025}
      - TEMPERATURE=0.7
    volumes:
      - ./Lectura.pdf:/app/Lectura.pdf
      - chroma_data:/app/chroma_db
    restart: unless-stopped

volumes:
  chroma_data:
